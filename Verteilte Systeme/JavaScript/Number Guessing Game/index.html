<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>Number Guessing Game</header>
    <div class="container">
        <h1 id="headLine">Bitte rate die Zahl!</h1>
        <h2 id="displayAttempts">Versuche: 0</h2>
        <form onsubmit="guessTheNumber(); return false;">
            <input id="guessInput" type="number" placeholder="Bitte Zahl eingeben" required min="0">
            <button>Raten!</button>
        </form>
    </div>


    <script src="index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-confetti@latest/dist/js-confetti.browser.js"></script>
</body>
</html>
